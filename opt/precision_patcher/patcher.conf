# =============================================================================
# patcher.conf — Precision Patcher Configuration
# =============================================================================
# Edit the values below before each run.
# Lines starting with # are comments and are ignored.
# =============================================================================

# ACTION: What operation to perform.
#   replace_inline  → Find and replace a string (uses sed)
#   insert_before   → Inject payload.txt BEFORE the anchor line (uses awk)
#   insert_after    → Inject payload.txt AFTER the anchor line (uses awk)
ACTION=replace_inline

# MATCH_MODE: How to interpret SEARCH_TARGET.
#   exact  → Literal string match (special characters are auto-escaped)
#   regex  → Treat SEARCH_TARGET as a regular expression
MATCH_MODE=exact

# REPLACE_OCCURRENCE: How many matches to patch per file.
#   first  → Stop after the first match found
#   all    → Patch every occurrence in the file
REPLACE_OCCURRENCE=all

# SEARCH_TARGET: The anchor string or pattern to look for in each file.
# Wrap in double quotes if it contains spaces.
SEARCH_TARGET="localhost"

# REPLACE_WITH: The replacement text.
# Only used when ACTION=replace_inline. Ignored for injection modes.
REPLACE_WITH="db.production.internal"

# =============================================================================
# EXAMPLES (uncomment one block at a time)
# =============================================================================

# --- Example 1: Simple string swap (active above) ---
# ACTION=replace_inline
# MATCH_MODE=exact
# REPLACE_OCCURRENCE=all
# SEARCH_TARGET="localhost"
# REPLACE_WITH="db.production.internal"

# --- Example 2: Inject security header before a specific line ---
# ACTION=insert_before
# MATCH_MODE=exact
# REPLACE_OCCURRENCE=first
# SEARCH_TARGET="return true;"

# --- Example 3: Append logging block after a function line (regex) ---
# ACTION=insert_after
# MATCH_MODE=regex
# REPLACE_OCCURRENCE=first
# SEARCH_TARGET="^def process_request\("
